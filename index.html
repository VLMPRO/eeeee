    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617; /* Slate 950 */
        -webkit-user-select: none;
        user-select: none;
        overflow-x: clip;
      }
      
      img {
        -webkit-user-drag: none;
        pointer-events: none;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      
      /* Artplayer Container Fixes */
      .art-video-player {
        z-index: 10;
      }
    </style>
